name: longitudinal
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # Install heavy binary packages via conda for reliable cross-platform builds
  - numpy>=1.26
  - pandas>=2.0
  - matplotlib>=3.8
  - seaborn>=0.13
  - scipy>=1.11
  - scikit-learn>=1.3
  - pyarrow>=14.0
  - ipykernel>=6.0
  - jupyterlab>=4.0

  - pip:
    - httpx>=0.27
    - tenacity>=8.0
    - pyyaml>=6.0
    - python-dotenv>=1.0
    - rich>=13.0
    - datasets>=2.18
    - openpyxl>=3.1
    - sentence-transformers>=2.0
    - openai>=1.0
    - vaderSentiment>=3.3
