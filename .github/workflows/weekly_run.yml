name: Weekly pipeline run

on:
  schedule:
    - cron: "0 5 * * 5"   # Friday 05:00 UTC — 07:00 CEST / 6:00 CET
  workflow_dispatch:

concurrency:
  group: weekly-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Download study DB artifact
        uses: actions/download-artifact@v4
        with:
          name: study-db
          path: .
        continue-on-error: true   # no artifact on first run

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reconstruct DB from JSONL if artifact unavailable
        run: |
          if [ ! -s study.db ] && [ -d results/waves ] && [ "$(ls -A results/waves/*.jsonl 2>/dev/null)" ]; then
            echo "Artifact unavailable — reconstructing DB from committed JSONL files..."
            python pipeline.py reconstruct
          fi

      - name: Run weekly pipeline (Gemini Pro)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python pipeline.py run --weekly

      - name: Export today's wave to JSONL
        run: python pipeline.py export --format jsonl --wave $(date -u +%Y-%m-%d)_weekly

      - name: Generate dashboard data
        run: python generate_dashboard_data.py
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ docs/
          git diff --cached --quiet && echo "Nothing to commit" || (
            git commit -m "chore: weekly run $(date -u +%Y-%m-%d)" &&
            git pull --rebase origin main &&
            git push
          )

      - name: Upload study DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: study-db
          path: study.db
          overwrite: true
          retention-days: 400

      - name: Send weekly summary email
        if: always()
        env:
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          GH_PAT:              ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          SMTP_HOST:           ${{ secrets.SMTP_HOST }}
          SMTP_PORT:           ${{ secrets.SMTP_PORT }}
          SMTP_USER:           ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:       ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
        run: python notify.py
