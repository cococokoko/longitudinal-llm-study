name: Daily pipeline run

on:
  schedule:
    - cron: "0 10 * * *"   # 11:00 CET (10:00 UTC)
  workflow_dispatch:         # allow manual trigger from GitHub UI

concurrency:
  group: daily-run
  cancel-in-progress: false   # queue rather than cancel — don't lose a run

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python pipeline.py run

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add study.db results/
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "chore: daily run $(date -u +%Y-%m-%d)" && git push

      - name: Send daily summary email
        if: always()
        env:
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          GH_PAT:              ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          SMTP_HOST:           ${{ secrets.SMTP_HOST }}
          SMTP_PORT:           ${{ secrets.SMTP_PORT }}
          SMTP_USER:           ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:       ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
        run: python notify.py
