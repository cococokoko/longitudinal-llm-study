# ──────────────────────────────────────────────────────────────────────────────
# config.yaml — LLM Dataset Longitudinal Study
# ──────────────────────────────────────────────────────────────────────────────

study:
  name: "LLM Dataset Longitudinal Study"
  db_path: "study.db"
  concurrency: 10
  requests_per_second: 5.0
  http_referer: "https://github.com/longitudinal-llm-study"
  site_name: "LLM Dataset Study"

# ── Main models (OpenRouter) ───────────────────────────────────────────────────
# model_id must match OpenRouter model string exactly.
# Auto-update checks for newer releases in the same family on each run.

models:
  - model_id: "openai/gpt-chat-latest"
    display_name: "GPT Chat"
    parameters:
      temperature: 0.0
      max_tokens: 1000


  - model_id: "~anthropic/claude-sonnet-latest"
    display_name: "Claude Sonnet"
    parameters:
      temperature: 0.0
      max_tokens: 1000


  - model_id: "~google/gemini-flash-latest"
    display_name: "Gemini Flash"
    parameters:
      temperature: 0.0
      max_tokens: 1000
      reasoning: {effort: "minimal"}

# ── Weekly models (Fridays only) ──────────────────────────────────────────────

weekly_models:
  - model_id: "~google/gemini-pro-latest"
    display_name: "Gemini Pro"
    parameters:
      temperature: 0.0s
      max_tokens: 1000

# ── Experiment models ─────────────────────────────────────────────────────────

experiment_models:
  - model_id: "google/gemini-2.5-flash-lite"
    display_name: "Gemini 2.5 Flash Lite"
    provider: "openrouter"
    parameters:
      temperature: 0.0
      max_tokens: 1024

# ── Datasets ──────────────────────────────────────────────────────────────────
# Each dataset entry is loaded, sampled, and sent as prompts to all models.
#
# type: local_json   — path to a local JSON file 
# type: huggingface  — HuggingFace dataset --> potential future extension 
#
# prompt_field:      column/key whose value becomes the prompt sent to the LLM
# id_field:          column/key used as the stable item ID (null = auto-index)
# max_prompt_length: truncate prompt to this many chars (0 = no limit)
# sampling_strategy: "random"  — different sample each wave (date-seeded)
#                    "fixed"   — same sample every wave (seed=42)
# sample_n:          how many items to draw per wave
datasets:
  - name: wvs7
    type: local_json
    path: wvs7.json
    prompt_field: prompt
    id_field: item_id
    max_prompt_length: 0
    sampling_strategy: fixed
    sample_n: null 

  - name: persona_prompts
    type: local_json
    path: persona_prompts.json
    prompt_field: prompt
    system_field: system         # null for baseline/user conditions; set for customer conditions
    id_field: item_id
    max_prompt_length: 0
    sampling_strategy: fixed
    sample_n: null

  - name: explorative
    type: local_json
    path: explorative.json
    prompt_field: prompt
    id_field: item_id
    max_prompt_length: 0
    sampling_strategy: fixed
    sample_n: null
